<!DOCTYPE html>
<html>
	<head>
		<title>Commenti</title>
		<link rel="stylesheet" th:href="@{/css/style.css}">
	</head>
	<body>
		<div class="nav">
		    <div class="nav-logo-section">
		        <strong><a th:href="@{/}">⚽ Tornei Calcio</a></strong>
		        
				<span th:if="${userDetails == null}" style="display: inline-flex; align-items: center;">
				            <a th:href="@{/login}" style="color: white; background: rgba(255, 255, 255, 0.2); padding: 5px 12px; border-radius: 4px; text-decoration: none; font-size: 13px; font-weight: bold; font-family: Arial, sans-serif;">Log in</a>
				        </span>
				        
				        <span th:if="${userDetails != null}" style="display: inline-flex; align-items: center;margin-left: 12px;">
				            <form th:action="@{/logout}" method="POST" style="margin: 0; padding:0; display: inline-flex;">
				                <button type="submit" style="background-color: #ef4444; color: white; border: none; padding: 6px 14px; border-radius: 4px; font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; cursor: pointer;">Log out</button>
				            </form>
				        </span>
		    </div>
		    
		    <div>
		        <a th:href="@{/tornei}">Tornei</a>
		        <a th:href="@{/giocatori}">Giocatori</a>
		        <a th:href="@{/squadre}">Squadre</a>
		        <a th:href="@{/partite}">Calendario</a>
		    </div>
		</div>
		
		<div class="list-container view-container form-container">
			
			<div class="torneo-header">
				<h1>Lascia un commento</h1>
			</div>

			<form th:action="${commento.id != null} ? @{'/utenti/commenti/' + ${commento.id}} : @{'/utenti/partite/' + ${commento.partita.id} + '/commenti'}" th:object="${commento}" method="POST" class="custom-form">
				
				<div th:if="${#fields.hasGlobalErrors()}">
					<p th:each="err:${#fields.globalErrors()}" th:text="${err}" class="error-global"></p>
				</div>
				
				<div class="form-group">
					<label class="form-label">Titolo:</label>
					<span><input type="text" th:field="${commento.titolo}" class="search-input form-input" placeholder="es: Partita mozzafiato!"></input></span>
				</div>
				
				<div class="form-group">
					<label class="form-label">Descrizione:</label>
					<span><input type="text" th:field="${commento.descrizione}" class="search-input form-input" placeholder="Scrivi qui il tuo commento..."></input></span>
				</div>
				
				<div class="form-submit-block">
					<span><button type="submit" class="button admin-btn form-btn">Conferma</button></span>
				</div>
			</form>
		</div>
		<footer>
		    Progetto SIW - Sistema gestione tornei calcio
		</footer>
	</body>
</html>
