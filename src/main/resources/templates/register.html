<!DOCTYPE html>
<html>
<head>
    <title>Registrazione</title>
</head>
<body>
    <h1> Registrati </h1>
    
    <form th:action="@{/register}" th:method="POST" th:object="${credenziali}">
        
        <div>
            <label>Nome:</label>
            <input type="text" name="nome" th:value="${utente.nome}" required />
            <p th:if="${#fields.hasErrors('utente.nome')}" th:errors="${utente.nome}" style="color:red;"></p>
        </div>
        
        <div>
            <label>Cognome:</label>
            <input type="text" name="cognome" th:value="${utente.cognome}" required />
            <p th:if="${#fields.hasErrors('utente.cognome')}" th:errors="${utente.cognome}" style="color:red;"></p>
        </div>
        
        <div>
            <label>Email:</label>
            <input type="email" name="email" th:value="${utente.email}" required />
            <p th:if="${#fields.hasErrors('utente.email')}" th:errors="${utente.email}" style="color:red;"></p>
        </div>
        
        <div>
            <label>Username:</label>
            <input type="text" th:field="*{username}" required />
            <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color:red;"></p>
        </div>
        
        <div>
            <label>Password:</label>
            <input type="password" th:field="*{password}" required />
            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red;"></p>
        </div>
        
        <div>
            <button type="submit">Registrati</button>
        </div>
    </form>
</body>
</html>
