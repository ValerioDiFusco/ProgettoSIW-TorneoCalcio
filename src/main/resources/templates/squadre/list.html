<!DOCTYPE html>
<html>
	<head>
		<title>Lista</title>
	</head>
	
	<body>
		<ul>
			<li th:each="s : ${squadre}">
				<a th:href="@{'/squadre/'+${s.id}}"
				th:text="${s.nome}">Nome Squadra</a>
			</li>
		</ul>
		<div th:if="${userDetails != null and userDetails.authorities.toString().contains('ADMIN')}">
			<a th:href="@{'/admin/squadre/new'}">Aggiungi Squadra</a>
		</div>
		
	</body>
	
</html>
