<!DOCTYPE html>
<html>
<head>
    <title>Dettaglio Squadra</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<div class="nav">
	    <div class="nav-logo-section">
	        <strong><a th:href="@{/}">⚽ Tornei Calcio</a></strong>
	        
			<span th:if="${userDetails == null}" style="display: inline-flex; align-items: center;">
			            <a th:href="@{/login}" style="color: white; background: rgba(255, 255, 255, 0.2); padding: 5px 12px; border-radius: 4px; text-decoration: none; font-size: 13px; font-weight: bold; font-family: Arial, sans-serif;">Log in</a>
			        </span>
			        
			        <span th:if="${userDetails != null}" style="display: inline-flex; align-items: center;margin-left: 12px;">
			            <form th:action="@{/logout}" method="POST" style="margin: 0; padding:0; display: inline-flex;">
			                <button type="submit" style="background-color: #ef4444; color: white; border: none; padding: 6px 14px; border-radius: 4px; font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; cursor: pointer;">Log out</button>
			            </form>
			        </span>
	    </div>
	    
	    <div>
	        <a th:href="@{/tornei}">Tornei</a>
	        <a th:href="@{/giocatori}">Giocatori</a>
	        <a th:href="@{/squadre}">Squadre</a>
	        <a th:href="@{/partite}">Calendario</a>
	    </div>
	</div>

    <div class="list-container view-container">
        
        <div class="torneo-header">
            <h1 th:text="${squadra.nome}">Nome Squadra</h1>
            <div class="torneo-badge">
                📍 <span th:text="${squadra.citta}"></span>
            </div>
        </div>

        <div class="info-card">
            <div class="info-row">
                <strong>Anno di Fondazione:</strong> 
                <span th:text="${squadra.annoFondazione}"></span>
            </div>
        </div>


        <div class="partite-section">
            <h2 class="section-title">🏃‍♂️ Rosa Giocatori</h2>
            <ol class="player-list">
                <li th:each="g : ${giocatori}" class="player-item">
                    <div class="player-info">
                        <a th:href="'/giocatori/' + ${g.id}" th:text="${g.nome + ' ' + g.cognome}" class="player-link">Nome Giocatore</a>
                        <span class="player-role" th:text="${g.ruolo}">Ruolo</span>
                    </div>
                </li>
            </ol>
        </div>
		
		<div th:if="${userDetails != null and userDetails.authorities.toString().contains('ADMIN')}" class="admin-panel team-admin-panel">
		    <a th:href="@{/admin/squadre/{id}/giocatori/new(id=${squadra.id})}" class="button btn-action">➕ Aggiungi Giocatore</a>
		    <a th:href="@{/admin/squadre/{id}/edit(id=${squadra.id})}" class="button btn-edit">📝 Modifica Squadra</a>
		    
		    <form th:action="@{/admin/squadre/{id}/delete(id=${squadra.id})}" method="POST" class="delete-form">
		        <button type="submit" class="btn-delete">🗑️ Elimina Squadra</button>
		    </form>
		</div>
        
    </div>
	<footer>
	    Progetto SIW - Sistema gestione tornei calcio
	</footer>

</body>
</html>
