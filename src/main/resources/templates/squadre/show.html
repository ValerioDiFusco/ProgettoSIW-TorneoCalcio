<!DOCTYPE html>
<html>
	<head>
		<title>Squadra</title>
	</head>
	<body>
		<h1 th:text="${squadra.nome}">Nome Torneo</h1>
		<div>
			<div>
				Anno: <span th:text="${squadra.annoFondazione}"></span>
			</div>
			<div>
				Città:<span th:text="${squadra.citta}"></span>
			</div>
			<div>
				Rosa:
				<ol>
					<li th:each="g : ${giocatori}">
						<a th:href="'/giocatori/' + ${g.id}" th:text="${g.nome + ' '+ g.cognome}"></a>
						<em th:text="${g.ruolo}"></em>
					</li>
				</ol>
				
			</div>
			
			<div th:if="${userDetails != null and userDetails.authorities.toString().contains('ADMIN')}">
				<a th:href="@{/admin/squadre/{id}/giocatori/new(id=${squadra.id})}">Aggiungi giocatore</a>
			</div>
			
			<div th:if="${userDetails != null and userDetails.authorities.toString().contains('ADMIN')}">
				<a th:href="@{/admin/squadre/{id}/edit(id=${squadra.id})}">Modifica Squadra</a>
			</div>	
			
		</div>
		


	</body>
	
</html>
