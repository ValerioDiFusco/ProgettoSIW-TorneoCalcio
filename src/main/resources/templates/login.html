<!DOCTYPE html>
<head>
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css?v=99}">
</head>
<body class="login-page">

<div class="login-container">
    <h1>Login</h1>
    
    <div th:if="${param.error}" class="error-message">
        <p>Username o password errati.</p>
    </div>

    <form th:action="@{/login}" th:method="POST" class="login-form">
        <div class="form-group">
            Username: <span><input type="text" name="username" required></span>
        </div>
        <div class="form-group">
            Password: <span><input type="password" name="password" required></span>
        </div>
        <div class="form-actions">
            <span><button type="submit" class="btn-submit">Conferma</button></span>
            <span><a th:href="@{/register}" class="link-register">Non hai ancora un account? Registrati</a></span>
        </div>
    </form>
</div>

</body>
</html>
